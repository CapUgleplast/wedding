<svg width="32" height="32" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle
            cx="40"
            cy="40"
            r="35"
            fill="none"
            stroke="url(#grad)"
            stroke-width="8"
            stroke-dasharray="130 100">
    </circle>

    <defs>
        <!-- градиент вдоль обводки: начало яркое, конец прозрачный -->
        <linearGradient id="grad" x1="94%" y1="-20%" x2="25%" y2="-30%">
            <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
        </linearGradient>
    </defs>
</svg>
